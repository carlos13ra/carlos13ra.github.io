<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing... | GOJOBOT-MD™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5ff;
            --cyan-glow: rgba(0, 245, 255, 0.6);
            --purple: #b300ff;
            --purple-glow: rgba(179, 0, 255, 0.4);
            --bg-void: #050510;
            --text: #e0f7ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-void);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 30% 50%, var(--cyan-glow) 0%, transparent 40%),
                radial-gradient(circle at 70% 50%, var(--purple-glow) 0%, transparent 40%),
                linear-gradient(rgba(5, 5, 16, 0.95), rgba(5, 5, 16, 0.98));
            animation: bgPulse 4s ease-in-out infinite;
            z-index: -1;
        }
        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
     .loader-container {
            text-align: center;
            position: relative;
        }
     .glitch-text {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            position: relative;
            animation: glitch 2s infinite;
            margin-bottom: 1rem;
        }
     .glitch-text::before,
     .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
     .glitch-text::before {
            left: 3px;
            text-shadow: -2px 0 var(--cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
     .glitch-text::after {
            left: -3px;
            text-shadow: -2px 0 var(--purple);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px var(--purple-glow); }
            50% { text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px var(--purple-glow); }
        }
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            25% { clip: rect(112px, 9999px, 76px, 0); }
            50% { clip: rect(85px, 9999px, 77px, 0); }
            75% { clip: rect(27px, 9999px, 97px, 0); }
            100% { clip: rect(64px, 9999px, 98px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 119px, 0); }
            25% { clip: rect(79px, 9999px, 69px, 0); }
            50% { clip: rect(31px, 9999px, 17px, 0); }
            75% { clip: rect(92px, 9999px, 102px, 0); }
            100% { clip: rect(59px, 9999px, 103px, 0); }
        }
     .brand-gradient {
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--cyan));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
     .loading-bar-container {
            width: 400px;
            max-width: 80vw;
            height: 6px;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--cyan-glow);
            border-radius: 10px;
            overflow: hidden;
            margin: 2rem auto 1.5rem;
            box-shadow: 0 0 20px var(--cyan-glow);
        }
     .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--cyan));
            background-size: 200% auto;
            animation: loadingProgress 3s ease-out forwards, shine 1s linear infinite;
            box-shadow: 0 20px var(--cyan-glow);
        }
        @keyframes loadingProgress {
            to { width: 100%; }
        }
     .loading-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            color: var(--cyan);
            text-transform: uppercase;
            font-weight: 700;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
     .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scan 2s linear infinite;
            opacity: 0.5;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
     .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--cyan);
        }
     .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
     .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
     .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
     .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        @media (max-width: 600px) {
        .glitch-text { font-size: 2rem; letter-spacing: 4px; }
        .loading-bar-container { width: 300px; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="loader-container">
        <div class="glitch-text brand-gradient" data-text="MANGUITO">MANGUITO</div>
        <div class="glitch-text brand-gradient" data-text="PROGRAMS™" style="font-size: 2rem; margin-bottom: 3rem;">PROGRAMS™</div>

        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-text" id="statusText">INITIALIZING SYSTEM...</div>
    </div>

    <script>
        // VERIFICAR QUE VENGA DEL LOGIN
        if (!localStorage.getItem('manguito_session')) {
            window.location.href = '/login.html';
        }

        const statusText = document.getElementById('statusText');
        const messages = [
            'INITIALIZING SYSTEM...',
            'LOADING NEURAL CORE...',
            'CONNECTING TO VOC...',
            'DECRYPTING PROTOCOLS...',
            'SYSTEM READY'
        ];

        let msgIndex = 0;
        const textInterval = setInterval(() => {
            msgIndex++;
            if (msgIndex < messages.length) {
                statusText.textContent = messages[msgIndex];
            }
        }, 600);

        // DESPUÉS DE 3.5 SEGUNDOS REDIRIGE AL DASHBOARD
        setTimeout(() => {
            clearInterval(textInterval);
            statusText.textContent = 'ACCESS GRANTED';
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 500);
        }, 3500);
    </script>
</body>
</html>
