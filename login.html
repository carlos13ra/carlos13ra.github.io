<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GOJOBOT-MD™ Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/qBtSZGFr/favicon.jpg">

    <style>
        :root {
            --cyan: #00f5ff;
            --cyan-glow: rgba(0, 245, 255, 0.4);
            --purple: #b300ff;
            --purple-glow: rgba(179, 0, 255, 0.3);
            --bg-void: #050510;
            --bg-glass: rgba(10, 10, 30, 0.6);
            --text: #e0f7ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-void);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(5, 5, 16, 0.9), rgba(5, 5, 16, 0.95)), url('https://i.postimg.cc/FzZLxS09/fondo.jpg');
            background-size: cover;
            z-index: -1;
        }
       .login-container {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--cyan);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 60px var(--cyan-glow);
            animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 60px var(--cyan-glow); }
            50% { box-shadow: 0 0 80px var(--purple-glow); }
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
       .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
       .tab {
            flex: 1;
            padding: 12px;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--cyan-glow);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            transition: all 0.3s;
        }
       .tab.active {
            background: var(--cyan);
            color: #000;
        }
       .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--cyan);
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--cyan-glow);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--purple-glow);
        }
       .error {
            color: #ff0050;
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
        }
       .success {
            color: #00ff88;
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
        }
       .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }
       .back-home a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 700;
        }
        #registerForm { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🥭 GOJOBOT-MD™</h1>

        <div class="tabs">
            <div class="tab active" onclick="showLogin()">LOGIN</div>
            <div class="tab" onclick="showRegister()">REGISTRO</div>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <div class="form-group">
                <label>Usuario o Email</label>
                <input type="text" id="loginUser" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" required>
            </div>
            <button type="submit">ENTRAR AL DASHBOARD</button>
            <div id="loginMsg"></div>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="regUser" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPass" required>
            </div>
            <button type="submit">CREAR CUENTA</button>
            <div id="regMsg"></div>
        </form>

        <div class="back-home">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabs = document.querySelectorAll('.tab');

        function showLogin() {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        }

        function showRegister() {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
        }

        // REGISTRO
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const msg = document.getElementById('regMsg');

            let users = JSON.parse(localStorage.getItem('manguito_users') || '[]');

            if (users.find(u => u.user === user || u.email === email)) {
                msg.innerHTML = '<p class="error">Usuario o email ya existe</p>';
                return;
            }

            users.push({ user, email, pass, plan: 'FREE', created: Date.now() });
            localStorage.setItem('manguito_users', JSON.stringify(users));
            localStorage.setItem('manguito_session', user);

            msg.innerHTML = '<p class="success">¡Cuenta creada! Redirigiendo...</p>';
            setTimeout(() => window.location.href = '/dashboard.html', 1500);
        });

        // LOGIN
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const msg = document.getElementById('loginMsg');

            let users = JSON.parse(localStorage.getItem('manguito_users') || '[]');
            const found = users.find(u => (u.user === user || u.email === user) && u.pass === pass);

            if (found) {
                localStorage.setItem('manguito_session', found.user);
                msg.innerHTML = '<p class="success">¡Bienvenido! Redirigiendo...</p>';
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } else {
                msg.innerHTML = '<p class="error">Usuario o contraseña incorrectos</p>';
            }
        });

        // Si ya está logueado, ir directo al dash
        if (localStorage.getItem('manguito_session')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
  </html>
