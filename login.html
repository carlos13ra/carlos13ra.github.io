<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticate | GOJOBOT-MD™</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5ff;
            --cyan-glow: rgba(0, 245, 255, 0.4);
            --purple: #b300ff;
            --purple-glow: rgba(179, 0, 255, 0.3);
            --bg-void: #050510;
            --bg-glass: rgba(10, 10, 30, 0.6);
            --text: #e0f7ff;
            --text-dim: #8892b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-void);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 50%, var(--cyan-glow) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, var(--purple-glow) 0%, transparent 50%),
                linear-gradient(rgba(5, 5, 16, 0.95), rgba(5, 5, 16, 0.98));
            z-index: -1;
        }
    .auth-container {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 2px solid transparent;
            background-image: linear-gradient(var(--bg-glass), var(--bg-glass)),
                              linear-gradient(90deg, var(--cyan), var(--purple));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0 60px rgba(0, 245, 255, 0.2);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 900;
        }
    .brand {
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--cyan);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    .input-wrapper {
            position: relative;
        }
    .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyan-glow);
        }
        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--cyan-glow);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow);
        }
    .initialize-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    .initialize-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px var(--purple-glow);
        }
    .initialize-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    .error {
            color: #ff0050;
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
            font-size: 0.9rem;
            word-break: break-word;
        }
    .success {
            color: #00ff88;
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
            font-size: 0.9rem;
        }
    .toggle-form {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    .toggle-form button {
            background: none;
            border: none;
            color: var(--cyan);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
        }
    .debug {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin-top: 1rem;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #ffed4e;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1><span class="brand">MANGUITO</span> AI</h1>
        <p class="subtitle" id="formTitle">Authenticate</p>

        <form id="authForm">
            <div class="form-group">
                <label>EMAIL</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉</span>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit" class="initialize-btn" id="submitBtn">INITIALIZE →</button>
            <div id="authMsg"></div>
            <div id="debugMsg" class="debug" style="display:none;"></div>
        </form>

        <p class="toggle-form">
            <span id="toggleText">Don't have an account?</span>
            <button type="button" id="toggleBtn">Sign Up</button>
        </p>
    </div>

    <script>
        // VERIFICAR QUE SUPABASE CARGÓ
        if (!window.supabase) {
            document.getElementById('authMsg').innerHTML = '<p class="error">Error: Supabase no cargó. Revisa tu internet.</p>';
        }

        const SUPABASE_URL = 'https://wwasafrtvbkrffqajaja.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OOL8GwS9u6zEtNTQRDxApw_EV3zSvzl';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const authForm = document.getElementById('authForm');
        const authMsg = document.getElementById('authMsg');
        const debugMsg = document.getElementById('debugMsg');
        const submitBtn = document.getElementById('submitBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleText = document.getElementById('toggleText');
        const formTitle = document.getElementById('formTitle');

        let isLogin = true;

        function showDebug(msg) {
            debugMsg.style.display = 'block';
            debugMsg.textContent = 'DEBUG: ' + msg;
            console.log('DEBUG:', msg);
        }

        showDebug('Supabase iniciado: ' + SUPABASE_URL);

        // SI YA ESTÁ LOGUEADO, IR AL DASHBOARD
        supabase.auth.getSession().then(({ data: { session }, error }) => {
            if (error) {
                showDebug('Error getSession: ' + error.message);
                return;
            }
            if (session) {
                showDebug('Ya hay sesión, redirigiendo...');
                window.location.href = '/dashboard.html';
            } else {
                showDebug('Sin sesión activa');
            }
        });

        // TOGGLE LOGIN/SIGNUP
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? 'Authenticate' : 'Create Account';
            submitBtn.textContent = isLogin ? 'INITIALIZE →' : 'SIGN UP →';
            toggleText.textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
            toggleBtn.textContent = isLogin ? 'Sign Up' : 'Login';
            authMsg.innerHTML = '';
            debugMsg.style.display = 'none';
        });

        // LOGIN / SIGNUP
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'LOADING...';
            authMsg.innerHTML = '';
            debugMsg.style.display = 'none';

            try {
                showDebug('Intentando ' + (isLogin ? 'login' : 'signup') + ' con: ' + email);
                
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    showDebug('Login exitoso. User ID: ' + data.user.id);
                    authMsg.innerHTML = '<p class="success">¡Acceso autorizado! Redirigiendo...</p>';
                    setTimeout(() => window.location.href = '/dashboard.html', 1000);
                } else {
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            emailRedirectTo: window.location.origin + '/dashboard.html'
                        }
                    });
                    if (error) throw error;
                    
                    showDebug('Signup respuesta: ' + JSON.stringify(data));
                    
                    if (data.user && data.user.identities && data.user.identities.length === 0) {
                        throw new Error('Este email ya está registrado. Usa Login.');
                    }
                    
                    authMsg.innerHTML = '<p class="success">¡Cuenta creada! Iniciando sesión...</p>';
                    showDebug('Intentando auto-login...');
                    
                    // Auto login después de signup
                    setTimeout(async () => {
                        const { error: loginError } = await supabase.auth.signInWithPassword({ email, password });
                        if (loginError) {
                            showDebug('Auto-login falló: ' + loginError.message);
                            authMsg.innerHTML = '<p class="error">Cuenta creada. Ahora haz Login manual</p>';
                            isLogin = true;
                            formTitle.textContent = 'Authenticate';
                            submitBtn.textContent = 'INITIALIZE →';
                            toggleText.textContent = "Don't have an account?";
                            toggleBtn.textContent = 'Sign Up';
                        } else {
                            showDebug('Auto-login exitoso');
                            window.location.href = '/dashboard.html';
                        }
                    }, 1500);
                }
            } catch (error) {
                console.error('ERROR COMPLETO:', error);
                let msg = error.message;
                if (msg.includes('Invalid login credentials')) msg = 'Email o contraseña incorrectos';
                if (msg.includes('Email not confirmed')) msg = 'DESACTIVA "Confirm email" en Supabase → Auth → Providers';
                if (msg.includes('User already registered')) msg = 'Este email ya existe. Usa Login';
                if (msg.includes('Failed to fetch')) msg = 'No hay conexión con Supabase. Revisa tu internet o la URL';
                if (msg.includes('network')) msg = 'Error de red. Revisa tu conexión';
                
                authMsg.innerHTML = `<p class="error">${msg}</p>`;
                showDebug('ERROR: ' + error.message);
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = isLogin ? 'INITIALIZE →' : 'SIGN UP →';
        });
    </script>
</body>
</html>
