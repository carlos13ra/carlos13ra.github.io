<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | carlos13ra</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; display: grid; place-items: center; height: 100vh; margin: 0; }
    .box { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; background: #333; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; background: #FACC15; color: #000; font-weight: bold; cursor: pointer; }
    .link { color: #FACC15; cursor: pointer; text-align: center; margin-top: 15px; font-size: 14px; }
    h2 { text-align: center; margin-top: 0; }
  </style>
</head>
<body>
  <div class="box">
    <h2 id="titulo">Iniciar Sesión</h2>
    <input type="email" id="email" placeholder="Correo" />
    <input type="password" id="password" placeholder="Contraseña" />
    <button id="btn-principal">Entrar</button>
    <div class="link" id="toggle">¿No tienes cuenta? Regístrate</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wwasafrtvbkrffqajaja.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_OOL8GwS9u6zEtNTQRDxApw_EV3zSvzl';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let esLogin = true;
    const titulo = document.getElementById('titulo');
    const btn = document.getElementById('btn-principal');
    const toggle = document.getElementById('toggle');

    toggle.onclick = () => {
      esLogin = !esLogin;
      titulo.textContent = esLogin ? 'Iniciar Sesión' : 'Registrarse';
      btn.textContent = esLogin ? 'Entrar' : 'Crear cuenta';
      toggle.textContent = esLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia sesión';
    };

    btn.onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) return alert('Completa todo bro');

      if (esLogin) {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return alert('Error: ' + error.message);
        window.location.href = 'perfil.html';
      } else {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) return alert('Error: ' + error.message);
        alert('Cuenta creada. Revisa tu correo para confirmar y luego inicia sesión.');
      }
    };

    // Si ya está logueado, mandar a perfil
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) window.location.href = 'perfil.html';
    });
  </script>
</body>
</html>
